; Unlockable Checks Demo Configuration
; Used by UnlockableCheckSpawner for self-contained randomizer demo.
; Only runs in Generals Challenge campaign. Edit to test different maps.
;
; Format:
;   [MapName]     - Map leaf name (e.g. CHI01, USA02)
;   Seed          - Deterministic seed for unit/building selection
;   UnitWaypoints - Comma-separated waypoint names (use Player_1_Start for campaign maps; Player_2_Start may not exist)
;   UnitTemplates - Comma-separated unit template names (enemy faction)
;   UnitCheckIds  - Comma-separated check IDs (one per spawned unit)
;   BuildingTemplates - Comma-separated building template names to tag
;   BuildingCheckIds  - Comma-separated check IDs (one per tagged building)
;   EnemyTeam     - Team name for spawned units (default: teamplayer1 for Generals Challenge AI)
;   SpawnOffsetSpread - Additional offset per unit (unit i gets offset + i*spread) for spreading far away
;   SpawnCount        - Number of units to spawn (0 = use UnitCheckIds count; cycles through if > count)
;   DamageOutputScalar - Damage dealt multiplier for spawned units (1.0 = normal, 0.5 = half damage)
;   DefendRadius      - World units; pull idle units back when outside (0 = no limit). Idle units between DefendRadius and MaxChaseRadius get pulled.
;   MaxChaseRadius    - World units; hard cap - always pull when outside, even when attacking (0 = no limit).
;     Both: 0-DefendRadius=free, DefendRadius-MaxChaseRadius=pull when idle only, beyond MaxChaseRadius=always pull.
;     Single radius: set DefendRadius=0 and use MaxChaseRadius only.
;   UnitMarkerFX      - Optional FXList for visual distinction (plays at spawn and every ~0.75 sec)
;
; Generals Challenge maps only (not original campaign).
; Section name MUST match the map leaf name (e.g. from "Maps\X\X.map" -> "X").
; USA01, CHI01 etc. are CAMPAIGN maps, not Generals Challenge.
; Run the game, start a Generals Challenge mission, and check the in-game message
; "no config for map X" to see the actual map name, then add [X] below.
; Example: Super Weapon General vs China Tank General may use a different map name.
;
; [Debug] - Optional debug section (parsed but not a map)
;   DebugScriptActions = Yes   - Log team-related script actions to debug window (identify triggers affecting spawned units)
;
[Debug]
DebugScriptActions = Yes
;
; Placeholder for common Generals Challenge map names (edit to match your game):
[GC_TankGeneral]
Seed = 42
UnitWaypoints = Player_1_Start
; Heavy debug demo: 10 check kills in a wide top-right arc from the player start.
; Tank_ChinaTankOverlord is an Archipelago-side alias, but the runtime thing factory
; only exposes ChinaTankOverlord for the base chassis.
UnitTemplates = ChinaTankOverlord,Tank_ChinaTankGattling,Tank_ChinaTankBattleMaster,ChinaTankDragon,ChinaVehicleInfernoCannon
UnitCheckIds = kill_supw_vs_tank_01,kill_supw_vs_tank_02,kill_supw_vs_tank_03,kill_supw_vs_tank_04,kill_supw_vs_tank_05,kill_supw_vs_tank_06,kill_supw_vs_tank_07,kill_supw_vs_tank_08,kill_supw_vs_tank_09,kill_supw_vs_tank_10
EnemyTeam = teamplayer1
SpawnOffset = 725
SpawnOffsetSpread = 225
SpawnCount = 10
DamageOutputScalar = 0.1
DefendRadius = 450
MaxChaseRadius = 950
